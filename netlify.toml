# ==========================================
# NETLIFY CONFIGURATION (FIXED)
# ==========================================

[build]
  command = "node build-index.js"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Clean URL redirect
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# SPA fallback (optional but safe)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ==========================================
# SECURITY HEADERS (SAFE)
# ==========================================

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ==========================================
# SEO: DO NOT INDEX JSON (BUT ALLOW ACCESS)
# ==========================================

[[headers]]
  for = "/data/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*.json"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# ==========================================
# CACHING
# ==========================================

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# ==========================================
# FILE TYPES
# ==========================================

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"
