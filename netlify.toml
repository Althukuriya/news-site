# ==========================================
# NETLIFY CONFIGURATION FOR BYTEBULLETIN
# Option B: Build Script Method
# ==========================================

[build]
  # This runs build-index.js before every deploy
  command = "node build-index.js"
  
  # Directory to publish (root folder)
  publish = "."

# Build environment settings
[build.environment]
  NODE_VERSION = "20"

# Redirects for clean URLs and SEO
[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true

# Prevent access to data folder (SEO - blocks JSON files)
[[redirects]]
  from = "/data/*"
  to = "/404.html"
  status = 404
  force = true

# Block direct access to JSON files
[[redirects]]
  from = "/*.json"
  to = "/404.html"
  status = 404
  force = true

# Standard 404 page
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Headers for security and SEO
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Tell search engines NOT to index JSON files
[[headers]]
  for = "/data/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/*.json"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

# Cache static assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML files - shorter cache
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

# Sitemap headers
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"

# Robots.txt headers
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain"