<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap Generator - NewsPortal</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: #f5f7fa;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 { color: #0a2540; margin-bottom: 10px; }
        .blog-url-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cfdfed;
            border-radius: 8px;
            font-size: 16px;
            margin: 20px 0;
        }
        button {
            background: #e63946;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }
        button:hover { background: #c1121f; }
        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 20px;
            display: none;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 8px;
        }
        .loading { background: #fff3cd; color: #856404; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .copy-btn {
            background: #0a2540;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ XML Sitemap Generator</h1>
        <p>Generate a sitemap.xml file for better Google indexing of your Blogger-powered news site.</p>
        
        <input type="text" id="blogUrl" class="blog-url-input" placeholder="https://yourblog.blogspot.com" value="https://yourblog.blogspot.com">
        
        <button id="generateBtn">Generate Sitemap</button>
        <button id="copyBtn" class="copy-btn" style="display:none;">Copy to Clipboard</button>
        
        <div id="status"></div>
        <pre id="sitemapOutput"></pre>
    </div>

    <script>
        function generateSlug(title, postId) {
            const cleanTitle = title
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '')
                .substring(0, 120);
            return `${cleanTitle}-${postId}`;
        }

        function generateCategorySlug(category) {
            return category
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-|-$/g, '');
        }

        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');
        const statusDiv = document.getElementById('status');
        const outputPre = document.getElementById('sitemapOutput');
        
        generateBtn.addEventListener('click', async () => {
            let blogUrl = document.getElementById('blogUrl').value.trim();
            if (!blogUrl) {
                showStatus('Please enter your Blogger URL', 'error');
                return;
            }
            
            blogUrl = blogUrl.replace(/\/$/, '');
            
            showStatus('Fetching posts from Blogger...', 'loading');
            outputPre.style.display = 'none';
            copyBtn.style.display = 'none';
            
            try {
                const url = `${blogUrl}/feeds/posts/default?alt=json&max-results=500`;
                const response = await fetch(url);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const entries = data.feed.entry || [];
                
                if (entries.length === 0) {
                    showStatus('No posts found. Make sure your blog is public.', 'error');
                    return;
                }
                
                const baseUrl = window.location.origin;
                const today = new Date().toISOString().split('T')[0];
                
                // Calculate total pages (assuming 12 posts per page)
                const postsPerPage = 12;
                const totalPages = Math.ceil(entries.length / postsPerPage);
                
                let sitemap = `<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
    <!-- Homepage -->
    <url>
        <loc>${baseUrl}/</loc>
        <lastmod>${today}</lastmod>
        <changefreq>daily</changefreq>
        <priority>1.0</priority>
    </url>`;
                
                // Add paginated pages
                for (let i = 2; i <= totalPages; i++) {
                    sitemap += `
    <url>
        <loc>${baseUrl}/page/${i}.html</loc>
        <lastmod>${today}</lastmod>
        <changefreq>daily</changefreq>
        <priority>0.9</priority>
    </url>`;
                }
                
                // Collect categories
                const categories = new Set();
                entries.forEach(entry => {
                    if (entry.category) {
                        entry.category.forEach(cat => categories.add(cat.term));
                    }
                });
                
                // Add category URLs with slug format
                categories.forEach(cat => {
                    const catSlug = generateCategorySlug(cat);
                    sitemap += `
    <url>
        <loc>${baseUrl}/category/${catSlug}.html</loc>
        <lastmod>${today}</lastmod>
        <changefreq>weekly</changefreq>
        <priority>0.7</priority>
    </url>`;
                });
                
                // Add post URLs with slug format
                entries.forEach(entry => {
                    const title = entry.title.$t;
                    const postId = entry.id.$t.split('post-')[1];
                    const slug = generateSlug(title, postId);
                    const lastmod = new Date(entry.published.$t).toISOString().split('T')[0];
                    sitemap += `
    <url>
        <loc>${baseUrl}/${slug}.html</loc>
        <lastmod>${lastmod}</lastmod>
        <changefreq>monthly</changefreq>
        <priority>0.8</priority>
    </url>`;
                });
                
                sitemap += `
</urlset>`;
                
                outputPre.textContent = sitemap;
                outputPre.style.display = 'block';
                copyBtn.style.display = 'inline-block';
                
                showStatus(`✅ Sitemap generated successfully! ${entries.length} posts + ${categories.size} categories + ${totalPages} pages.`, 'success');
                
            } catch (error) {
                console.error(error);
                showStatus(`Error: ${error.message}. Make sure your blog is public and CORS is enabled.`, 'error');
            }
        });
        
        copyBtn.addEventListener('click', async () => {
            const sitemapText = outputPre.textContent;
            await navigator.clipboard.writeText(sitemapText);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => {
                copyBtn.textContent = 'Copy to Clipboard';
            }, 2000);
        });
        
        function showStatus(message, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
    </script>
</body>
</html>
