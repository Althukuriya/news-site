<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My Bookmarks - NewsPortal</title>
    <meta name="description" content="Your saved articles">
    <link rel="canonical" href="/bookmarks.html">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div id="readingProgressBar"></div>
    
    <header class="site-header">
        <div class="container">
            <div class="header-top">
                <div class="logo-area">
                    <a href="/index.html" class="logo">News<span>Portal</span></a>
                    <span class="breaking-tag">LIVE</span>
                </div>
                <div class="header-actions">
                    <button class="dark-mode-toggle" id="darkModeToggle"><i class="fas fa-moon"></i></button>
                    <button class="search-toggle" id="searchToggleBtn"><i class="fas fa-search"></i></button>
                    <button class="bookmark-nav" id="bookmarkNavBtn"><i class="fas fa-bookmark"></i><span id="bookmarkCount">0</span></button>
                    <button class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
                </div>
            </div>
            <div class="search-bar-container" id="searchBarContainer">
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search news..." autocomplete="off">
                    <button id="searchSubmitBtn"><i class="fas fa-search"></i></button>
                    <div id="liveSearchResults" class="live-search-results"></div>
                </div>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="/index.html">Home</a></li>
                </ul>
                <div class="category-dropdown">
                    <button class="dropdown-btn">Categories <i class="fas fa-chevron-down"></i></button>
                    <div class="dropdown-content"></div>
                </div>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div style="margin: 48px 0;">
                <h2 style="margin-bottom: 28px; border-left: 5px solid #e63946; padding-left: 18px;">
                    <i class="fas fa-bookmark"></i> Saved Articles
                </h2>
                <div id="bookmarksList" class="news-grid">
                    <p style="text-align:center;padding:40px;">Loading your bookmarks...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-about">
                    <h3>NewsPortal</h3>
                    <p>Your trusted source for breaking news.</p>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-facebook-f"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                        <a href="#"><i class="fab fa-youtube"></i></a>
                    </div>
                </div>
                <div class="footer-links">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="/index.html">Home</a></li>
                        <li><a href="/bookmarks.html">Bookmarks</a></li>
                        <li><a href="/sitemap.xml">Sitemap</a></li>
                    </ul>
                </div>
                <div class="footer-contact">
                    <h4>Contact</h4>
                    <p><i class="fas fa-envelope"></i> news@newsportal.com</p>
                    <p><i class="fas fa-phone"></i> +1 (555) 123-4567</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 NewsPortal. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="/script.js"></script>
    <script>
        // Load bookmarks from localStorage
        const bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
        const container = document.getElementById('bookmarksList');
        
        if (bookmarks.length === 0) {
            container.innerHTML = '<p style="text-align:center;padding:40px;">No saved articles. <a href="/index.html">Browse news</a></p>';
        } else {
            // For bookmarks, we need to show saved posts - but since we have static HTML,
            // we'll show links to the actual pages
            container.innerHTML = '<div style="text-align:center;padding:40px;">Bookmarked posts will appear here. <a href="/index.html">Browse news</a></div>';
        }
    </script>
</body>
</html>
