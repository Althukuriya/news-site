<!DOCTYPE html>
<html ⚡ lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,minimum-scale=1,initial-scale=1">
    <meta name="description" content="AMP version of news article">
    <link rel="canonical" href="{{CANONICAL}}">
    <link rel="amphtml" href="{{CANONICAL}}?amp=1">
    <title>{{TITLE}} - AMP NewsPortal</title>
    <script async src="https://cdn.ampproject.org/v0.js"></script>
    <script async custom-element="amp-img" src="https://cdn.ampproject.org/v0/amp-img-0.1.js"></script>
    <style amp-boilerplate>body{-webkit-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-moz-animation:-amp-start 8s steps(1,end) 0s 1 normal both;-ms-animation:-amp-start 8s steps(1,end) 0s 1 normal both;animation:-amp-start 8s steps(1,end) 0s 1 normal both}@-webkit-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}@-keyframes -amp-start{from{visibility:hidden}to{visibility:visible}}</style>
    <noscript><style amp-boilerplate>body{-webkit-animation:none;-moz-animation:none;-ms-animation:none;animation:none}</style></noscript>
    <style amp-custom>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
            background: #fff;
            color: #1a1a1a;
        }
        h1 { font-size: 28px; margin-bottom: 16px; line-height: 1.3; }
        .meta { color: #666; font-size: 14px; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 12px; }
        .meta span { margin-right: 16px; }
        amp-img { margin: 20px 0; border-radius: 12px; }
        .content { font-size: 18px; }
        .content p { margin-bottom: 20px; }
        .back-link { display: inline-block; margin-top: 30px; color: #e63946; text-decoration: none; font-weight: 600; }
        .header { margin-bottom: 20px; border-bottom: 2px solid #e63946; padding-bottom: 10px; }
        .header h2 { margin: 0; font-size: 24px; }
        .header span { color: #e63946; }
    </style>
</head>
<body>
    <div class="header">
        <h2>News<span>Portal</span> <span style="font-size:12px; background:#e63946; color:white; padding:2px 8px; border-radius:4px;">AMP</span></h2>
    </div>
    
    <h1>{{TITLE}}</h1>
    <div class="meta">
        <span>📅 {{DATE}}</span>
        <span>👤 {{AUTHOR}}</span>
    </div>
    
    {{IMAGE}}
    
    <div class="content">
        {{CONTENT}}
    </div>
    
    <a href="{{CANONICAL}}" class="back-link">← Read full version</a>
</body>
</html>
