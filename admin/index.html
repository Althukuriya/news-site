<!-- admin/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteBulletin CMS</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background: #f5f7fa; }
        .cms-loading { display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 16px; color: #4a5568; }
        .cms-loading .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #e63946; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <!-- Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
    <div id="cms-placeholder" class="cms-loading">
        <div class="spinner"></div>
        <div>Loading CMS...</div>
    </div>
    
    <script>
        // Netlify CMS script
        (function() {
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/netlify-cms@^2.10.0/dist/netlify-cms.js';
            script.async = true;
            script.onload = () => {
                const placeholder = document.getElementById('cms-placeholder');
                if (placeholder) placeholder.style.display = 'none';
            };
            document.head.appendChild(script);
        })();
        
        // Handle identity redirect after login
        if (window.netlifyIdentity) {
            window.netlifyIdentity.on('init', user => {
                if (!user) window.netlifyIdentity.on('login', () => document.location.reload());
            });
        }
        
        // Redirect to admin after login if needed
        if (window.location.href.includes('#')) {
            window.location.href = window.location.href.replace(/#.*$/, '');
        }
    </script>
</body>
</html>
